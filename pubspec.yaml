name: multisignal
version: 0.1.0+1
description: Cross-platform video and serial synchronized recorder built with Flutter.
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

flutter:
  uses-material-design: true

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  camera: ^0.12.0+1
  camera_desktop: ^1.1.7
  video_player: ^2.11.1
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^8.1.7
  permission_handler: ^11.3.1
  usb_serial: ^0.5.2
  flutter_libserialport: ^0.6.0
  uuid: ^4.5.3
  intl: ^0.20.2
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
